services:
  db:
    image: mysql:8.0
    container_name: test_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: test_db
      DATABASE_URL: "mysql+pymysql://root:password@db:3306/test_db"
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: python:3.10-slim
    container_name: test_backend
    working_dir: /app
    command: >
      bash -c "pip install fastapi uvicorn pymysql pydantic-settings sqlalchemy && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:18-slim
    container_name: test_frontend
    working_dir: /app
    command: >
      bash -c "echo 'Frontend ready' && sleep infinity"
    ports:
      - "3000:3000"
    environment:
      - WDS_SOCKET_PORT=0